<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>🇩🇪 German Learning App — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a2e;--card:#16162a;--border:#2a2a4a;--text:#e1e1e1;--text2:#8888aa;--accent:#6c5ce7;--accent2:#00d4aa;--accent3:#ff6b6b;--gold:#ffd700;--orange:#ff9f43;--pink:#fd79a8;--blue:#74b9ff;--radius:12px;--shadow:0 4px 24px rgba(0,0,0,0.3)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;overflow-x:hidden}
#app{min-height:100vh;display:flex;flex-direction:column}
.hidden{display:none!important}
.container{max-width:1200px;margin:0 auto;padding:0 20px;width:100%}
a{color:var(--accent);text-decoration:none}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:var(--radius);font-weight:600;font-size:14px;cursor:pointer;border:none;transition:all .3s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5a4bd1;transform:translateY(-2px);box-shadow:0 8px 24px rgba(108,92,231,0.3)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:var(--border);transform:translateY(-1px)}
.btn-success{background:var(--accent2);color:#0a0a0f}
.btn-success:hover{background:#00c49a;transform:translateY(-2px)}
.btn-danger{background:var(--accent3);color:#fff}
.btn-danger:hover{background:#e05555;transform:translateY(-2px)}
.btn-sm{padding:6px 14px;font-size:12px}
.btn-lg{padding:14px 32px;font-size:16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;transition:all .3s}
.card:hover{box-shadow:var(--shadow);border-color:var(--accent)}
.card-glow:hover{box-shadow:0 0 30px rgba(108,92,231,0.15);border-color:rgba(108,92,231,0.3)}
input,select,textarea{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;width:100%;transition:border-color .3s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,0.15)}
textarea{resize:vertical;min-height:100px}
label{display:block;font-weight:500;margin-bottom:6px;color:var(--text2);font-size:13px}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-beginner{background:rgba(0,212,170,0.15);color:var(--accent2)}
.badge-intermediate{background:rgba(255,159,67,0.15);color:var(--orange)}
.badge-advanced{background:rgba(255,107,107,0.15);color:var(--accent3)}
.badge-progress{background:rgba(108,92,231,0.15);color:var(--accent)}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#fff;flex-shrink:0}
.avatar-sm{width:32px;height:32px;font-size:12px}
.avatar-lg{width:60px;height:60px;font-size:24px}
.progress-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s ease}
.grid{display:grid;gap:20px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(300px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
.flex{display:flex;gap:16px}
.flex-wrap{flex-wrap:wrap}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.gap-sm{gap:8px}
.gap-lg{gap:24px}
.mt-1{margin-top:8px}
.mt-2{margin-top:16px}
.mt-3{margin-top:24px}
.mt-4{margin-top:32px}
.mb-2{margin-bottom:16px}
.mb-3{margin-bottom:24px}
.text-center{text-align:center}
.text-right{text-align:right}
.text-muted{color:var(--text2)}
.text-accent{color:var(--accent)}
.text-success{color:var(--accent2)}
.text-danger{color:var(--accent3)}
.text-gold{color:var(--gold)}
.fw-6{font-weight:600}
.fw-7{font-weight:700}
.fw-8{font-weight:800}
.fs-sm{font-size:13px}
.fs-lg{font-size:18px}
.fs-xl{font-size:24px}
.fs-2xl{font-size:32px}
.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Student Navbar */
.student-nav{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 20px;position:sticky;top:0;z-index:100}
.student-nav .container{display:flex;align-items:center;justify-content:space-between;height:64px}
.nav-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer}
.nav-links{display:flex;gap:4px}
.nav-links a{padding:8px 16px;border-radius:8px;color:var(--text2);font-size:14px;font-weight:500;transition:all .3s}
.nav-links a:hover,.nav-links a.active{color:var(--text);background:var(--bg3)}
.nav-user{display:flex;align-items:center;gap:10px;cursor:pointer;padding:6px 12px;border-radius:8px;transition:all .3s}
.nav-user:hover{background:var(--bg3)}
.mobile-menu-btn{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}

/* Admin Sidebar */
.admin-layout{display:flex;min-height:100vh}
.admin-sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);padding:20px 0;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;z-index:200;transition:transform .3s}
.admin-sidebar .logo{padding:0 20px 24px;font-size:18px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;border-bottom:1px solid var(--border);margin-bottom:16px}
.admin-sidebar .nav-item{display:flex;align-items:center;gap:12px;padding:10px 20px;color:var(--text2);font-size:14px;cursor:pointer;transition:all .3s;border-left:3px solid transparent}
.admin-sidebar .nav-item:hover{background:var(--bg3);color:var(--text)}
.admin-sidebar .nav-item.active{background:var(--bg3);color:var(--accent);border-left-color:var(--accent)}
.admin-sidebar .nav-item .icon{width:20px;text-align:center}
.admin-main{margin-left:260px;flex:1;padding:24px 32px}
.admin-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.admin-topbar h1{font-size:24px;font-weight:700}
.hamburger{display:none;background:none;border:none;color:var(--text);font-size:24px;cursor:pointer}

/* Page transitions */
.page{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.animate-float{animation:float 3s ease-in-out infinite}

/* Hero Section */
.hero{text-align:center;padding:80px 0 60px;background:linear-gradient(180deg,rgba(108,92,231,0.08) 0%,transparent 100%)}
.hero h1{font-size:52px;font-weight:900;line-height:1.1;margin-bottom:16px;background:linear-gradient(135deg,#fff,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:18px;color:var(--text2);max-width:600px;margin:0 auto 32px}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.hero-stats{display:flex;gap:48px;justify-content:center;margin-top:48px;padding:32px;background:var(--card);border:1px solid var(--border);border-radius:16px;max-width:700px;margin-left:auto;margin-right:auto}
.hero-stat{text-align:center}
.hero-stat .num{font-size:28px;font-weight:800}
.hero-stat .label{font-size:13px;color:var(--text2);margin-top:4px}

/* Features */
.features{padding:60px 0}
.section-title{font-size:32px;font-weight:800;text-align:center;margin-bottom:8px}
.section-sub{color:var(--text2);text-align:center;margin-bottom:40px;font-size:16px}
.feature-card{padding:32px;text-align:center}
.feature-card .icon{font-size:40px;margin-bottom:16px}
.feature-card h3{font-size:18px;margin-bottom:8px}
.feature-card p{color:var(--text2);font-size:14px}

/* Course cards */
.course-card .thumb{height:140px;border-radius:8px;margin:-24px -24px 16px;background-size:cover;background-position:center;position:relative}
.course-card .thumb .badge{position:absolute;top:12px;left:12px}
.course-card h3{font-size:16px;margin-bottom:6px}
.course-card .meta{display:flex;gap:16px;font-size:13px;color:var(--text2)}

/* Lesson page */
.lesson-header{margin-bottom:24px}
.lesson-content{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;line-height:1.9}
.lesson-content h2{font-size:24px;margin:24px 0 12px}
.lesson-content p{margin-bottom:16px;color:var(--text2)}
.lesson-content .german{background:var(--bg2);padding:16px 20px;border-radius:8px;border-left:3px solid var(--accent);margin:16px 0;font-size:16px}
.lesson-content .german .translation{color:var(--text2);font-size:14px;margin-top:4px}

/* Quiz */
.quiz-question{padding:24px;background:var(--bg2);border-radius:var(--radius);margin-bottom:16px}
.quiz-question h3{margin-bottom:16px;font-size:16px}
.quiz-option{display:block;padding:12px 16px;border-radius:8px;border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .3s}
.quiz-option:hover{background:var(--bg3);border-color:var(--accent)}
.quiz-option.selected{background:rgba(108,92,231,0.15);border-color:var(--accent)}
.quiz-option.correct{background:rgba(0,212,170,0.15);border-color:var(--accent2)}
.quiz-option.wrong{background:rgba(255,107,107,0.15);border-color:var(--accent3)}

/* Chat */n.chat-container{height:500px;display:flex;flex-direction:column;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
.chat-msg.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-msg.ai{background:var(--bg2);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px;border:1px solid var(--border)}
.chat-input{display:flex;gap:8px;padding:16px;border-top:1px solid var(--border)}
.chat-input input{flex:1}
.chat-typing{display:flex;gap:4px;padding:12px 16px;background:var(--bg2);border-radius:12px;align-self:flex-start;border:1px solid var(--border)}
.chat-typing span{width:8px;height:8px;border-radius:50%;background:var(--text2);animation:pulse 1s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}

/* Tables */
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.data-table td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:14px}
.data-table tr:hover td{background:var(--bg2)}
.data-table .actions{display:flex;gap:8px}
.data-table .actions button{padding:6px 12px;font-size:12px}

/* Media grid */
.media-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px}
.media-item{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden;cursor:pointer;transition:all .3s}
.media-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.media-item .preview{height:120px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:32px}
.media-item .info{padding:12px}
.media-item .info p{font-size:13px}
.media-item .info span{font-size:11px;color:var(--text2)}

/* Flashcard */
.flashcard{perspective:1000px;cursor:pointer;height:200px}
.flashcard-inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg)}
.flashcard-front,.flashcard-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;border-radius:var(--radius);padding:24px;text-align:center}
.flashcard-front{background:var(--card);border:1px solid var(--border)}
.flashcard-back{background:var(--accent);transform:rotateY(180deg);color:#fff}
.flashcard-front .big{font-size:28px;font-weight:700}
.flashcard-front .hint{font-size:13px;color:var(--text2);margin-top:8px}
.flashcard-back .big{font-size:24px;font-weight:600}

/* Stats cards */
.stat-card{padding:24px;text-align:center}
.stat-card .stat-icon{font-size:32px;margin-bottom:12px}
.stat-card .stat-value{font-size:32px;font-weight:800;margin-bottom:4px}
.stat-card .stat-label{font-size:13px;color:var(--text2)}

/* Tab system */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab{display:flex;align-items:center;gap:8px;padding:12px 20px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;border-bottom:2px solid transparent;transition:all .3s}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* AI Training cards */
.training-card{padding:24px}
.training-card .model-name{font-size:18px;font-weight:600;margin-bottom:4px}
.training-card .model-desc{color:var(--text2);font-size:13px;margin-bottom:16px}
.training-card .model-stat{display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--border)}

/* Responsive */
@media(max-width:1024px){
.admin-sidebar{transform:translateX(-100%)}
.admin-sidebar.open{transform:translateX(0)}
.admin-main{margin-left:0}
.hamburger{display:block}
}
@media(max-width:768px){
.hero h1{font-size:36px}
.hero-stats{gap:24px;flex-wrap:wrap}
.nav-links{display:none}
.mobile-menu-btn{display:block}
.nav-links.open{display:flex;flex-direction:column;position:absolute;top:64px;left:0;right:0;background:var(--bg2);padding:16px;border-bottom:1px solid var(--border)}
.container{padding:0 16px}
.admin-main{padding:16px}
.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}
.hero-stats{flex-direction:column;gap:16px}
.quiz-option{padding:10px 14px}
}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text2)}

/* Misc */
.empty-state{text-align:center;padding:60px 20px}
.empty-state .icon{font-size:64px;margin-bottom:16px;opacity:.5}
.empty-state h3{font-size:20px;margin-bottom:8px}
.empty-state p{color:var(--text2);max-width:400px;margin:0 auto 24px}
.divider{height:1px;background:var(--border);margin:24px 0}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
.tag-blue{background:rgba(116,185,255,0.15);color:var(--blue)}
.tag-green{background:rgba(0,212,170,0.15);color:var(--accent2)}
.tag-red{background:rgba(255,107,107,0.15);color:var(--accent3)}
.tag-orange{background:rgba(255,159,67,0.15);color:var(--orange)}
.tag-purple{background:rgba(108,92,231,0.15);color:var(--accent)}
.tag-pink{background:rgba(253,121,168,0.15);color:var(--pink)}
</style>
</head>

let currentPage='home';let isAdmin=false;
function navigate(page,data){
  if(page.startsWith('admin')){isAdmin=true;document.body.classList.add('admin-mode')}
  else if(page==='home'&&!data){}else{isAdmin=false;document.body.classList.remove('admin-mode')}
  currentPage=page;render(data)}
function goBack(){window.history.back()||navigate('home')}
function $id(id){return document.getElementById(id)}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ===== RENDER FUNCTION =====
function titleForPage(page,data){
  const titles={
    home:'🇩🇪 Learn German with AI',dashboard:'📊 Dashboard',courses:'📚 Courses',
    'course-detail':'📖 Course Details','lesson-view':'📄 Lesson',exercise:'✍️ Exercise',
    quiz:'📝 Quiz',profile:'👤 Profile','ai-chat':'🤖 AI Chat',speaking:'🎤 Speaking',
    reading:'📖 Reading',writing:'✍️ Writing',vocabulary:'📝 Vocabulary',
    login:'🔐 Login',register:'📝 Register',
    'admin-dashboard':'📊 Admin Dashboard','admin-courses':'📚 Manage Courses',
    'admin-lessons':'📄 Manage Lessons','admin-exercises':'✍️ Manage Exercises',
    'admin-quizzes':'📝 Manage Quizzes','admin-users':'👥 Manage Users',
    'admin-media':'🖼️ Media Library','admin-analytics':'📈 Analytics',
    'admin-settings':'⚙️ Settings','admin-ai-training':'🧠 AI Training',
    'admin-admins':'🔐 Admin Management'
  };
  return titles[page]||'🇩🇪 Learn German';
}

function render(data){
  const pageFunctions={
    home:pageHome,login:pageLogin,register:pageRegister,dashboard:pageDashboard,
    courses:pageCourses,'course-detail':()=>pageCourseDetail(data||{}),
    'lesson-view':()=>pageLessonView(data||{}),exercise:()=>pageExercise(data||{}),
    quiz:pageQuiz,profile:pageProfile,'ai-chat':pageAIChat,speaking:pageSpeaking,
    reading:pageReading,writing:pageWriting,vocabulary:pageVocabulary,
    'admin-dashboard':pageAdminDashboard,'admin-courses':pageAdminCourses,
    'admin-lessons':pageAdminLessons,'admin-exercises':pageAdminExercises,
    'admin-quizzes':pageAdminQuizzes,'admin-users':pageAdminUsers,
    'admin-media':pageAdminMedia,'admin-analytics':pageAdminAnalytics,
    'admin-settings':pageAdminSettings,'admin-ai-training':pageAdminAiTraining,
    'admin-admins':pageAdminAdmins
  };
  const fn=pageFunctions[currentPage]||pageFunctions.home;
  document.title=titleForPage(currentPage,data);
  document.getElementById('app').innerHTML=fn();
  // Update admin page title
  const t=document.getElementById('adminPageTitle');
  if(t)t.textContent=titleForPage(currentPage,data).replace(/^[^\s]*\s/,'');
  window.scrollTo(0,0);
}

// ===== UTILITY FUNCTIONS =====
function selectQuizOption(el){
  const parent=el.parentElement;
  parent.querySelectorAll('.quiz-option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
}

function filterCourses(level){
  if(level==='all'){document.querySelectorAll('[data-level]').forEach(c=>c.style.display='')}
  else{document.querySelectorAll('[data-level]').forEach(c=>{c.style.display=c.dataset.level.includes(level)?'':'none'})}
}

function sendChatMessage(){
  const input=document.getElementById('chatInput');
  const msg=input.value.trim();
  if(!msg)return;
  const msgs=document.getElementById('chatMessages');
  const typing=document.getElementById('chatTyping');
  msgs.innerHTML+=`<div class="chat-msg user">${escHtml(msg)}</div>`;
  input.value='';
  typing.classList.remove('hidden');
  msgs.scrollTop=msgs.scrollHeight;
  setTimeout(()=>{
    typing.classList.add('hidden');
    const responses=[
      'Das ist eine gute Frage! 🤔 Lass mich dir helfen...',
      'Gut gemacht! 👍 Versuchen wir einen anderen Satz.',
      'Interessant! 🧐 Hier ist ein Tipp für dich:',
      'Prima! 🌟 Du machst große Fortschritte!',
      'Verstehe! 💡 Lass uns das genauer betrachten.'
    ];
    msgs.innerHTML+=`<div class="chat-msg ai">${responses[Math.floor(Math.random()*responses.length)]}</div>`;
    msgs.scrollTop=msgs.scrollHeight;
  },1500);
}

function addChatMessage(role,text){
  const msgs=document.getElementById('chatMessages');
  const typing=document.getElementById('chatTyping');
  if(role==='ai'){
    typing.classList.remove('hidden');
    setTimeout(()=>{
      typing.classList.add('hidden');
      msgs.innerHTML+=`<div class="chat-msg ai">${text}</div>`;
      msgs.scrollTop=msgs.scrollHeight;
    },1000);
  }else{
    msgs.innerHTML+=`<div class="chat-msg user">${text}</div>`;
  }
  msgs.scrollTop=msgs.scrollHeight;
}
